name: License NPM

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  license-check:
    runs-on: ubuntu-latest
    name: License Check
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm install

      - name: Check licenses
        run: >
          npx license-checker-rseidelsohn
          --failOn="${{ vars.FORBIDDEN_LICENSES }}"
          --excludePrivatePackages
          --markdown
          >> $GITHUB_STEP_SUMMARY
